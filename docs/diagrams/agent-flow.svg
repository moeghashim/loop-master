<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 950" role="img" aria-labelledby="flow-title flow-desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="flow-title">Per-issue flow</title>
  <desc id="flow-desc">Triage to execute to the CI gate. A reviewed issue branches to an independent reviewer; a solo issue goes straight to your merge. Only a green gate makes review or merge reachable.</desc>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#9C9B96"/>
    </marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="170%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#1b1b18" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="800" height="950" fill="#ffffff"/>

  <!-- edges -->
  <g fill="none" stroke="#9C9B96" stroke-width="1.6" marker-end="url(#ah)">
    <line x1="230" y1="113" x2="230" y2="156"/>
    <line x1="230" y1="231" x2="230" y2="274"/>
    <line x1="230" y1="349" x2="230" y2="392"/>
    <line x1="230" y1="467" x2="230" y2="510"/>
    <line x1="230" y1="585" x2="230" y2="628"/>
    <line x1="230" y1="703" x2="230" y2="746"/>
    <line x1="381" y1="666" x2="448" y2="666"/>
    <polyline points="600,703 600,784 384,784"/>
  </g>

  <!-- edge labels -->
  <g font-size="12.5" fill="#6E6D67">
    <text x="244" y="729">solo</text>
    <text x="414" y="657" text-anchor="middle">reviewed</text>
  </g>

  <!-- 1. You -->
  <rect x="80" y="40" width="300" height="72" rx="14" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5" filter="url(#sh)"/>
  <text x="230" y="70" text-anchor="middle" font-size="16.5" font-weight="700" fill="#085041">You</text>
  <text x="230" y="90" text-anchor="middle" font-size="12.5" fill="#1D9E75">triage · set intent</text>

  <!-- 2. GitHub -->
  <rect x="80" y="158" width="300" height="72" rx="14" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5" filter="url(#sh)"/>
  <text x="230" y="188" text-anchor="middle" font-size="16.5" font-weight="700" fill="#0C447C">GitHub</text>
  <text x="230" y="208" text-anchor="middle" font-size="12.5" fill="#378ADD">source of truth · labels</text>

  <!-- 3. Dispatcher -->
  <rect x="80" y="276" width="300" height="72" rx="14" fill="#FBEAF0" stroke="#D4537E" stroke-width="1.5" filter="url(#sh)"/>
  <text x="230" y="306" text-anchor="middle" font-size="16.5" font-weight="700" fill="#72243E">Dispatcher · Action</text>
  <text x="230" y="326" text-anchor="middle" font-size="12.5" fill="#D4537E">decides solo vs reviewed</text>

  <!-- 4. Executor -->
  <rect x="80" y="394" width="300" height="72" rx="14" fill="#F1EFE8" stroke="#A6A59F" stroke-width="1.5" filter="url(#sh)"/>
  <text x="230" y="424" text-anchor="middle" font-size="16.5" font-weight="700" fill="#2C2C2A">Executor · vendor app</text>
  <text x="230" y="444" text-anchor="middle" font-size="12.5" fill="#6B6A64">you can jump in</text>

  <!-- 5. CI -->
  <rect x="80" y="512" width="300" height="72" rx="14" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5" filter="url(#sh)"/>
  <text x="230" y="542" text-anchor="middle" font-size="16.5" font-weight="700" fill="#633806">CI · make verify</text>
  <text x="230" y="562" text-anchor="middle" font-size="12.5" fill="#BA7517">gate · exit 0 to pass</text>

  <!-- 6. review: label? -->
  <rect x="80" y="630" width="300" height="72" rx="14" fill="#F4F4F2" stroke="#C2C1BC" stroke-width="1.5" filter="url(#sh)"/>
  <text x="230" y="671" text-anchor="middle" font-size="16.5" font-weight="700" fill="#3A3A36">review: label?</text>

  <!-- 7. You · merge -->
  <rect x="80" y="748" width="300" height="72" rx="14" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5" filter="url(#sh)"/>
  <text x="230" y="778" text-anchor="middle" font-size="16.5" font-weight="700" fill="#085041">You · merge</text>
  <text x="230" y="798" text-anchor="middle" font-size="12.5" fill="#1D9E75">final gate · Done</text>

  <!-- 8. Reviewer -->
  <rect x="450" y="630" width="300" height="72" rx="14" fill="#FAECE7" stroke="#D85A30" stroke-width="1.5" filter="url(#sh)"/>
  <text x="600" y="660" text-anchor="middle" font-size="16.5" font-weight="700" fill="#712B13">Reviewer · vendor app</text>
  <text x="600" y="680" text-anchor="middle" font-size="12.5" fill="#D85A30">different tool · jump in</text>

  <!-- legend -->
  <g font-size="12" fill="#57564F">
    <rect x="120" y="874" width="15" height="15" rx="4" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.3"/>
    <text x="144" y="886">you</text>
    <rect x="320" y="874" width="15" height="15" rx="4" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.3"/>
    <text x="344" y="886">GitHub · truth</text>
    <rect x="520" y="874" width="15" height="15" rx="4" fill="#FBEAF0" stroke="#D4537E" stroke-width="1.3"/>
    <text x="544" y="886">dispatcher · Action</text>
    <rect x="120" y="904" width="15" height="15" rx="4" fill="#F1EFE8" stroke="#A6A59F" stroke-width="1.3"/>
    <text x="144" y="916">executor app</text>
    <rect x="320" y="904" width="15" height="15" rx="4" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.3"/>
    <text x="344" y="916">CI gate</text>
    <rect x="520" y="904" width="15" height="15" rx="4" fill="#FAECE7" stroke="#D85A30" stroke-width="1.3"/>
    <text x="544" y="916">reviewer app</text>
  </g>
</svg>
